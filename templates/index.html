<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Multi-Agent Comic Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Your existing CSS here - keep all your styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; }
        .controls, .pipeline, .story-box { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        textarea { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 15px; }
        .btn { padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; background: white; color: #667eea; }
        .btn-primary { background: #ffd700; color: #333; }
        .agent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .comic-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Multi-Agent Comic Generator</h1>
            <p>by Robina Mirbahar · Google Developer Expert</p>
        </div>

        <div class="controls">
            <textarea id="prompt" placeholder="Enter your comic idea... (e.g., 'penguin in a castle')"></textarea>
            <div class="button-group">
                <button class="btn" onclick="generateStory()" id="storyBtn">1. Generate Story</button>
                <button class="btn btn-primary" onclick="generateComic()" id="comicBtn" disabled>2. Generate Comic</button>
            </div>
            <div class="extra-buttons">
                <button class="btn" onclick="toggleADKAutoMode()" id="adkAutoBtn" style="background:#9b59b6; color:white;">🎬 ADK Auto: OFF</button>
            </div>
        </div>

        <div class="pipeline">
            <h2>🤖 Agent Pipeline</h2>
            <div class="agent-grid" id="agentGrid"></div>
        </div>

        <div id="storyResult" style="display: none;">
            <div class="story-box">
                <h2>📖 Generated Story</h2>
                <div class="story-content" id="storyContent"></div>
            </div>
        </div>

        <div id="comicResult" style="display: none;">
            <div class="comic-gallery">
                <h2>🎨 Your Comic</h2>
                <div class="comic-grid" id="comicGrid"></div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:1000;">
        <div style="background:white; padding:30px; border-radius:20px; text-align:center;">
            <div class="spinner" style="border:4px solid #f0f0f0; border-top:4px solid #667eea; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:0 auto;"></div>
            <h3>Generating...</h3>
        </div>
    </div>

    <!-- Load ONLY the clean JavaScript -->
    <script src="/static/js/clean-all.js"></script>
    
    <script>
        // Minimal agent display function
        function updateAgentDisplay() {
            const grid = document.getElementById('agentGrid');
            if (!grid) return;
            
            const agents = [
                ["Story Generator", "completed", 100, '<i class="fas fa-pen-fancy"></i>'],
                ["Script Director", "pending", 0, '<i class="fas fa-video"></i>'],
                ["Panel Generator", "pending", 0, '<i class="fas fa-paint-brush"></i>']
            ];
            
            let html = '';
            agents.forEach(([name, status, progress, icon]) => {
                let statusText = status === 'completed' ? '✅ Complete' : '⏳ Pending';
                let statusColor = status === 'completed' ? '#27ae60' : '#95a5a6';
                
                html += `<div class="agent-card" style="background:white; border-radius:10px; padding:15px; color:#333;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:1.5rem; background:linear-gradient(135deg,#667eea,#764ba2); width:45px; height:45px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white;">${icon}</span>
                        <div><h3>${name}</h3><span style="color:${statusColor}">${statusText}</span></div>
                    </div>
                    <div style="height:4px; background:#e0e0e0; border-radius:2px; margin-top:10px;">
                        <div style="width:${progress}%; height:100%; background:${statusColor}; border-radius:2px;"></div>
                    </div>
                </div>`;
            });
            grid.innerHTML = html;
        }
        
        // Placeholder functions
        window.generateComic = function() { alert("Generate comic - to be implemented"); };
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateAgentDisplay();
            console.log("✅ App initialized");
        });
    </script>
    
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</body>
</html>
    <!-- Agent Fix Script -->
    <script src="/static/js/agent-fix.js"></script>
    <!-- Emoji Fix Script -->
    <script src="/static/js/emoji-fix.js"></script>
